x-erp-nusantara-environment: &erp-nusantara-environment
  APP_NAME: ${APP_NAME:-ERP Nusantara}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_TIMEZONE: ${APP_TIMEZONE:-Asia/Makassar}
  APP_URL: ${APP_URL:-https://general-supply.nusantaraabadijaya.com}
  APP_LOCALE: ${APP_LOCALE:-id}
  APP_FALLBACK_LOCALE: ${APP_FALLBACK_LOCALE:-en}
  APP_FAKER_LOCALE: ${APP_FAKER_LOCALE:-id_ID}
  APP_MAINTENANCE_DRIVER: ${APP_MAINTENANCE_DRIVER:-file}
  APP_MAINTENANCE_STORE: ${APP_MAINTENANCE_STORE:-database}
  PHP_CLI_SERVER_WORKERS: ${PHP_CLI_SERVER_WORKERS:-4}
  BCRYPT_ROUNDS: ${BCRYPT_ROUNDS:-12}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_STACK: ${LOG_STACK:-single}
  LOG_DEPRECATIONS_CHANNEL: ${LOG_DEPRECATIONS_CHANNEL:-null}
  LOG_LEVEL: ${LOG_LEVEL:-warning}
  DB_CONNECTION: ${DB_CONNECTION:-mysql}
  DB_HOST: ${DB_HOST:-erp-nusantara-mysql}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-erp_nusantara}
  DB_USERNAME: ${DB_USERNAME:-erp_nusantara}
  DB_PASSWORD: ${DB_PASSWORD}
  DB_CHARSET: ${DB_CHARSET:-utf8mb4}
  DB_COLLATION: ${DB_COLLATION:-utf8mb4_unicode_ci}
  MYSQL_ATTR_SSL_CA: ${MYSQL_ATTR_SSL_CA:-}
  CACHE_STORE: ${CACHE_STORE:-database}
  CACHE_PREFIX: ${CACHE_PREFIX:-erp_nusantara_cache}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  SESSION_LIFETIME: ${SESSION_LIFETIME:-120}
  SESSION_ENCRYPT: ${SESSION_ENCRYPT:-false}
  SESSION_PATH: ${SESSION_PATH:-/}
  SESSION_DOMAIN: ${SESSION_DOMAIN:-.general-supply.nusantaraabadijaya.com}
  SESSION_SECURE_COOKIE: ${SESSION_SECURE_COOKIE:-true}
  BROADCAST_CONNECTION: ${BROADCAST_CONNECTION:-log}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  MEMCACHED_HOST: ${MEMCACHED_HOST:-127.0.0.1}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
  REDIS_HOST: ${REDIS_HOST:-127.0.0.1}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  REDIS_PORT: ${REDIS_PORT:-6379}
  MAIL_MAILER: ${MAIL_MAILER:-log}
  MAIL_SCHEME: ${MAIL_SCHEME:-null}
  MAIL_HOST: ${MAIL_HOST:-127.0.0.1}
  MAIL_PORT: ${MAIL_PORT:-2525}
  MAIL_USERNAME: ${MAIL_USERNAME:-null}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-null}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-noreply@nusantaraabadijaya.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-ERP Nusantara}
  AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
  AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
  AWS_DEFAULT_REGION: ${AWS_DEFAULT_REGION:-us-east-1}
  AWS_BUCKET: ${AWS_BUCKET:-}
  AWS_USE_PATH_STYLE_ENDPOINT: ${AWS_USE_PATH_STYLE_ENDPOINT:-false}
  VITE_APP_NAME: ${VITE_APP_NAME:-ERP Nusantara}
  GOTENBERG_URL: ${GOTENBERG_URL:-http://erp-nusantara-gotenberg:3000}

services:
  erp-nusantara-app:
    build:
      context: .
      dockerfile: Dockerfile
    image: erp-nusantara-frankenphp:latest
    container_name: erp-nusantara-app
    restart: unless-stopped
    depends_on:
      erp-nusantara-mysql:
        condition: service_healthy
    environment:
      <<: *erp-nusantara-environment
      SERVER_NAME: :8080
      FRANKENPHP_CONFIG: ""
    volumes:
      - erp_nusantara_storage:/app/storage
      - erp_nusantara_cache:/app/bootstrap/cache
    labels:
      - traefik.enable=true
      - traefik.docker.network=workspace_local-dev
      - traefik.http.routers.erp-nusantara.rule=Host(`general-supply.nusantaraabadijaya.com`)
      - traefik.http.routers.erp-nusantara.entrypoints=websecure
      - traefik.http.routers.erp-nusantara.tls=true
      - traefik.http.routers.erp-nusantara.tls.certresolver=letsencrypt
      - traefik.http.services.erp-nusantara.loadbalancer.server.port=8080
    healthcheck:
      test: ["CMD-SHELL", "wget --quiet --tries=1 --spider http://127.0.0.1:8080/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s
    networks:
      - erp-nusantara-internal
      - workspace_local-dev

  erp-nusantara-mysql:
    image: mysql:8.4
    container_name: erp-nusantara-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-erp_nusantara}
      MYSQL_USER: ${DB_USERNAME:-erp_nusantara}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - erp_nusantara_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - erp-nusantara-internal

  erp-nusantara-gotenberg:
    image: gotenberg/gotenberg:8
    container_name: erp-nusantara-gotenberg
    restart: unless-stopped
    networks:
      - erp-nusantara-internal

volumes:
  erp_nusantara_storage:
  erp_nusantara_cache:
  erp_nusantara_mysql_data:

networks:
  erp-nusantara-internal:
    driver: bridge
  workspace_local-dev:
    external: true
    name: workspace_local-dev
